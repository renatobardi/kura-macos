name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Test — macOS
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift Package dependencies
        run: |
          cd Kura
          xcodebuild -resolvePackageDependencies \
            -scheme Kura \
            -project Kura.xcodeproj

      - name: Test
        run: |
          set -o pipefail
          cd Kura
          xcodebuild test \
            -scheme Kura \
            -project Kura.xcodeproj \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
