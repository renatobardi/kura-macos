name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Test — macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # glassEffect e outros APIs macOS 26 exigem Xcode 26+ SDK.
          # Seleciona a versão mais recente disponível no runner.
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode: $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift Package dependencies
        run: |
          cd Kura
          xcodebuild -resolvePackageDependencies \
            -scheme Kura \
            -project Kura.xcodeproj

      - name: Build
        run: |
          set -o pipefail
          cd Kura
          xcodebuild build \
            -scheme Kura \
            -project Kura.xcodeproj \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
